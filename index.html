<!DOCTYPE html>
<html lang="ja">
  <script src="https://pecpec37-gift.github.io/portal/stamp.js"></script>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏐 バレーボールクイズ道場</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Bebas+Neue&display=swap');

  :root {
    --bg: #0a0e1a;
    --surface: #131929;
    --surface2: #1a2236;
    --border: #2a3a5c;
    --accent: #f5a623;
    --accent2: #e8521a;
    --blue: #3b82f6;
    --green: #22c55e;
    --red: #ef4444;
    --text: #e8edf5;
    --text-dim: #8899bb;
    --ball: #f5a623;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── 背景アニメ ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 20%, rgba(245,166,35,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 50% 35% at 80% 80%, rgba(59,130,246,0.08) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 680px;
    margin: 0 auto;
    padding: 16px;
  }

  /* ── ヘッダー ── */
  .header {
    text-align: center;
    padding: 32px 0 20px;
  }
  .ball-icon {
    font-size: clamp(48px, 10vw, 72px);
    display: block;
    animation: bounce 2s ease-in-out infinite;
  }
  @keyframes bounce {
    0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)}
  }
  .game-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(28px, 7vw, 52px);
    letter-spacing: 4px;
    color: var(--accent);
    text-shadow: 0 0 30px rgba(245,166,35,0.5);
    margin-top: 8px;
  }
  .game-subtitle {
    font-size: clamp(13px, 3vw, 16px);
    color: var(--text-dim);
    margin-top: 4px;
    letter-spacing: 2px;
  }

  /* ── カード ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: clamp(16px, 4vw, 28px);
    margin-bottom: 16px;
  }

  /* ── ルール表示 ── */
  .rules {
    line-height: 1.9;
    font-size: clamp(13px, 3vw, 15px);
    color: var(--text-dim);
  }
  .rules h3 {
    color: var(--text);
    font-size: clamp(14px, 3.5vw, 17px);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .rules span.plus { color: var(--green); font-weight: 700; }
  .rules span.minus { color: var(--red); font-weight: 700; }

  /* ── ジャンル選択 ── */
  .genre-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 10px;
    margin-bottom: 20px;
  }
  .genre-btn {
    background: var(--surface2);
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 14px 10px;
    color: var(--text);
    cursor: pointer;
    text-align: center;
    font-family: inherit;
    font-size: 13px;
    transition: all .2s;
  }
  .genre-btn:hover, .genre-btn.selected {
    border-color: var(--accent);
    background: rgba(245,166,35,0.1);
    color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 4px 16px rgba(245,166,35,0.2);
  }
  .genre-btn .genre-icon { font-size: 22px; display: block; margin-bottom: 6px; }
  .genre-btn .genre-count { font-size: 11px; color: var(--text-dim); margin-top: 4px; }

  /* ── 入力 ── */
  .input-group { margin-bottom: 16px; }
  .input-group label {
    display: block;
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 6px;
  }
  .input-group input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    color: var(--text);
    font-family: inherit;
    font-size: 15px;
    outline: none;
    transition: border-color .2s;
  }
  .input-group input:focus { border-color: var(--accent); }

  /* ── ボタン ── */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 14px 28px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    font-family: inherit;
    font-size: 15px;
    font-weight: 700;
    transition: all .2s;
    text-decoration: none;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    width: 100%;
    font-size: clamp(14px, 3.5vw, 17px);
    padding: 16px;
    box-shadow: 0 4px 20px rgba(245,166,35,0.3);
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 28px rgba(245,166,35,0.45); }
  .btn-secondary {
    background: var(--surface2);
    color: var(--text-dim);
    border: 1px solid var(--border);
    font-size: 13px;
    padding: 10px 18px;
  }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
  .btn-portal {
    background: transparent;
    color: var(--text-dim);
    border: 1px solid var(--border);
    font-size: 13px;
    padding: 10px 18px;
    text-decoration: none;
  }
  .btn-portal:hover { border-color: var(--blue); color: var(--blue); }

  /* ── クイズ画面 ── */
  .quiz-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    gap: 10px;
    flex-wrap: wrap;
  }
  .q-progress {
    font-size: 13px;
    color: var(--text-dim);
    white-space: nowrap;
  }
  .q-progress strong { color: var(--accent); font-size: 18px; }
  .q-score {
    font-weight: 700;
    font-size: 18px;
    color: var(--accent);
    white-space: nowrap;
  }

  /* タイマー */
  .timer-bar-wrap {
    background: var(--surface2);
    border-radius: 8px;
    height: 10px;
    overflow: hidden;
    margin-bottom: 16px;
  }
  .timer-bar {
    height: 100%;
    border-radius: 8px;
    transition: width .5s linear, background .5s;
    background: linear-gradient(90deg, var(--green), var(--accent));
  }
  .timer-display {
    text-align: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(28px, 7vw, 42px);
    color: var(--accent);
    letter-spacing: 2px;
    margin-bottom: 12px;
  }
  .timer-display.danger { color: var(--red); animation: pulse .5s ease-in-out infinite alternate; }
  @keyframes pulse { from{opacity:1} to{opacity:.5} }

  /* 問題タイプバッジ */
  .q-type-badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
    margin-bottom: 10px;
  }
  .badge-mc { background: rgba(59,130,246,0.2); color: var(--blue); border: 1px solid var(--blue); }
  .badge-tf { background: rgba(245,166,35,0.2); color: var(--accent); border: 1px solid var(--accent); }

  /* 問題文 */
  .question-text {
    font-size: clamp(14px, 3.5vw, 18px);
    font-weight: 700;
    line-height: 1.6;
    margin-bottom: 20px;
    color: var(--text);
  }

  /* 選択肢 */
  .choices { display: flex; flex-direction: column; gap: 10px; }
  .choice-btn {
    background: var(--surface2);
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
    color: var(--text);
    cursor: pointer;
    font-family: inherit;
    font-size: clamp(13px, 3vw, 15px);
    text-align: left;
    transition: all .15s;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .choice-btn:hover:not(:disabled) {
    border-color: var(--accent);
    background: rgba(245,166,35,0.08);
    transform: translateX(4px);
  }
  .choice-btn.correct { border-color: var(--green)!important; background: rgba(34,197,94,0.15)!important; color: var(--green)!important; }
  .choice-btn.wrong   { border-color: var(--red)!important;   background: rgba(239,68,68,0.15)!important;  color: var(--red)!important; }
  .choice-btn:disabled { cursor: default; }
  .choice-label {
    width: 28px; height: 28px;
    background: var(--border);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 13px;
    flex-shrink: 0;
  }

  /* ○× ボタン */
  .tf-choices {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-top: 10px;
  }
  .tf-btn {
    background: var(--surface2);
    border: 2px solid var(--border);
    border-radius: 16px;
    padding: 24px 10px;
    cursor: pointer;
    font-size: clamp(36px, 10vw, 56px);
    transition: all .15s;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 6px;
  }
  .tf-btn .tf-label { font-size: 13px; font-family: inherit; font-weight: 700; }
  .tf-btn:hover:not(:disabled) { transform: scale(1.04); }
  .tf-btn.tf-maru:hover:not(:disabled) { border-color: var(--green); background: rgba(34,197,94,0.1); }
  .tf-btn.tf-batsu:hover:not(:disabled) { border-color: var(--red); background: rgba(239,68,68,0.1); }
  .tf-btn.correct { border-color: var(--green)!important; background: rgba(34,197,94,0.15)!important; }
  .tf-btn.wrong   { border-color: var(--red)!important;   background: rgba(239,68,68,0.15)!important; }
  .tf-btn:disabled { cursor: default; }

  /* フィードバック */
  .feedback {
    text-align: center;
    font-size: clamp(14px, 3.5vw, 17px);
    font-weight: 700;
    padding: 12px;
    border-radius: 10px;
    margin-top: 14px;
    animation: fadeIn .3s ease;
  }
  @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
  .feedback.correct { background: rgba(34,197,94,0.15); color: var(--green); }
  .feedback.wrong   { background: rgba(239,68,68,0.15);  color: var(--red); }

  /* 次へボタン */
  .next-btn {
    width: 100%;
    margin-top: 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    color: var(--accent);
    font-family: inherit;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all .2s;
  }
  .next-btn:hover { background: rgba(245,166,35,0.1); border-color: var(--accent); }

  /* ── 結果画面 ── */
  .result-big {
    text-align: center;
    padding: 10px 0 20px;
  }
  .result-emoji { font-size: 56px; display: block; }
  .result-score {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(60px, 15vw, 96px);
    color: var(--accent);
    line-height: 1;
    text-shadow: 0 0 40px rgba(245,166,35,0.5);
  }
  .result-label { color: var(--text-dim); font-size: 13px; letter-spacing: 2px; }
  .result-breakdown {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin: 16px 0;
  }
  .rb-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 8px;
    text-align: center;
  }
  .rb-num { font-size: clamp(20px, 5vw, 28px); font-weight: 900; }
  .rb-label { font-size: 11px; color: var(--text-dim); margin-top: 4px; }

  /* 間違えた問題 */
  .mistakes-list { margin-top: 8px; }
  .mistake-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-left: 4px solid var(--red);
    border-radius: 0 12px 12px 0;
    padding: 14px 16px;
    margin-bottom: 10px;
  }
  .mistake-q { font-size: 13px; font-weight: 700; margin-bottom: 8px; }
  .mistake-your { font-size: 12px; color: var(--red); margin-bottom: 4px; }
  .mistake-ans { font-size: 13px; color: var(--green); font-weight: 700; }

  /* ── ランキング ── */
  .ranking-table {
    width: 100%;
    border-collapse: collapse;
    font-size: clamp(12px, 2.8vw, 14px);
  }
  .ranking-table th {
    text-align: left;
    padding: 10px 8px;
    color: var(--text-dim);
    font-size: 12px;
    border-bottom: 1px solid var(--border);
  }
  .ranking-table td {
    padding: 10px 8px;
    border-bottom: 1px solid rgba(42,58,92,0.4);
  }
  .ranking-table tr:first-child td { color: #ffd700; font-weight: 700; }
  .ranking-table tr:nth-child(2) td { color: #c0c0c0; }
  .ranking-table tr:nth-child(3) td { color: #cd7f32; }
  .rank-medal { font-size: 16px; }

  /* タブ */
  .tabs { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .tab-btn {
    padding: 8px 16px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text-dim);
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
    transition: all .2s;
  }
  .tab-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* 画面切り替え */
  .screen { display: none; }
  .screen.active { display: block; }

  /* ボタン列 */
  .btn-row { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }

  .section-title {
    font-size: clamp(14px, 3.5vw, 17px);
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  hr.divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }

  /* ── ジャンル選択済みハイライト（強調） ── */
  .genre-btn.selected {
    border-color: var(--accent) !important;
    background: rgba(245,166,35,0.15) !important;
    color: var(--accent) !important;
    box-shadow: 0 0 0 3px rgba(245,166,35,0.25), 0 4px 20px rgba(245,166,35,0.25) !important;
    transform: translateY(-3px) scale(1.03) !important;
  }

  /* ── 確認モーダル ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  .modal-overlay.open { display: flex; animation: fadeIn .2s ease; }
  .modal-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: clamp(20px, 5vw, 32px);
    max-width: 400px;
    width: 100%;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    animation: slideUp .25s ease;
  }
  @keyframes slideUp { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }
  .modal-genre-icon { font-size: 48px; display: block; margin-bottom: 8px; }
  .modal-genre-name {
    font-size: clamp(18px, 5vw, 24px);
    font-weight: 900;
    color: var(--accent);
    margin-bottom: 4px;
  }
  .modal-genre-count { font-size: 13px; color: var(--text-dim); margin-bottom: 20px; }
  .modal-input-group { margin-bottom: 16px; text-align: left; }
  .modal-input-group label { display: block; font-size: 13px; color: var(--text-dim); margin-bottom: 6px; }
  .modal-input-group input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    color: var(--text);
    font-family: inherit;
    font-size: 15px;
    outline: none;
    transition: border-color .2s;
  }
  .modal-input-group input:focus { border-color: var(--accent); }
  .modal-start-btn {
    width: 100%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 16px;
    font-family: inherit;
    font-size: clamp(15px, 4vw, 18px);
    font-weight: 700;
    cursor: pointer;
    margin-bottom: 10px;
    box-shadow: 0 4px 20px rgba(245,166,35,0.35);
    transition: all .2s;
  }
  .modal-start-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 28px rgba(245,166,35,0.5); }
  .modal-cancel-btn {
    background: none;
    border: none;
    color: var(--text-dim);
    font-family: inherit;
    font-size: 13px;
    cursor: pointer;
    padding: 6px;
    transition: color .2s;
  }
  .modal-cancel-btn:hover { color: var(--text); }

  /* ── ジャンルカードのタップヒント ── */
  .genre-tap-hint {
    font-size: 11px;
    color: var(--text-dim);
    text-align: center;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
  }
</style>
</head>
<body>
<div class="container">

<!-- ===== TOP ===== -->
<div id="screen-top" class="screen active">
  <div class="header">
    <span class="ball-icon">🏐</span>
    <div class="game-title">VOLLEYBALL QUIZ</div>
    <div class="game-subtitle">バレーボールクイズ道場</div>
  </div>

  <div class="card rules">
    <h3>📋 ルール</h3>
    制限時間：120秒 ／ 各ジャンル10問ランダム出題<br>
    ✅ 正解 → <span class="plus">+10点</span> ＋ 時間+5秒<br>
    ❌ 不正解 → 減点なし ＋ 時間−5秒のペナルティ<br>
    🏆 残り時間がそのままボーナス点に加算！<br>
    【4択】と【○×】がランダムにミックスされます
  </div>

  <div class="card">
    <div class="section-title">🎯 ジャンルをタップして即スタート！</div>
    <div class="genre-tap-hint">👆 カードをタップするとすぐに始められます</div>
    <div class="genre-grid" id="genre-grid"></div>
  </div>

  <!-- 確認モーダル -->
  <div class="modal-overlay" id="confirm-modal">
    <div class="modal-box">
      <span class="modal-genre-icon" id="modal-icon"></span>
      <div class="modal-genre-name" id="modal-name"></div>
      <div class="modal-genre-count" id="modal-count"></div>
      <div class="modal-input-group">
        <label>プレーヤー名を入力</label>
        <input type="text" id="player-name" placeholder="例：バレー太郎" maxlength="20">
      </div>
      <button class="modal-start-btn" onclick="startGame()">▶ スタート！</button>
      <button class="modal-cancel-btn" onclick="closeModal()">← ジャンル選択に戻る</button>
    </div>
  </div>

  <div class="btn-row" style="margin-top:10px">
    <button class="btn btn-secondary" onclick="showScreen('screen-ranking')">🏆 スコアランキングを見る</button>
    <a href="https://pecpec37-gift.github.io/portal/" class="btn btn-portal">🏠 ポータルサイトに戻る</a>
  </div>
</div>

<!-- ===== RANKING ===== -->
<div id="screen-ranking" class="screen">
  <div class="header">
    <div class="game-title" style="font-size:clamp(22px,5vw,36px)">🏆 スコアランキング</div>
  </div>

  <div class="card">
    <div class="tabs" id="ranking-tabs"></div>
    <div id="ranking-content"></div>
  </div>

  <div class="btn-row">
    <button class="btn btn-secondary" onclick="showScreen('screen-top')">← トップへ</button>
  </div>
</div>

<!-- ===== QUIZ ===== -->
<div id="screen-quiz" class="screen">
  <div class="quiz-header">
    <div class="q-progress">Q<strong id="q-num">1</strong> / 10</div>
    <div class="q-score"><span id="q-score">0</span> pt</div>
  </div>

  <div class="timer-display" id="timer-display">120 秒</div>
  <div class="timer-bar-wrap">
    <div class="timer-bar" id="timer-bar" style="width:100%"></div>
  </div>

  <div class="card">
    <div id="q-type-badge" class="q-type-badge badge-mc">4択</div>
    <div class="question-text" id="q-text"></div>
    <div id="choices-area"></div>
    <div id="feedback-area"></div>
    <button class="next-btn" id="next-btn" style="display:none" onclick="nextQuestion()">次の問題へ →</button>
  </div>
</div>

<!-- ===== RESULT ===== -->
<div id="screen-result" class="screen">
  <div class="header">
    <div class="game-title" style="font-size:clamp(22px,5vw,36px)">🏆 結果発表</div>
  </div>

  <div class="card result-big">
    <span class="result-emoji" id="result-emoji">🎉</span>
    <div class="result-score" id="result-score">0</div>

// =============================================
//  ゲーム状態
// =============================================
let state = {
  screen: 'top',
  genre: null,
  player: '',
  questions: [],
  qIndex: 0,
  score: 0,
  timeLeft: 120,
  timer: null,
  answered: false,
  mistakes: [],
  correctCount: 0,
  wrongCount: 0,
  timeBonus: 0,
};

// =============================================
//  初期化
// =============================================
function init() {
  renderGenreGrid();
}

function renderGenreGrid() {
  const grid = document.getElementById('genre-grid');
  grid.innerHTML = '';
  Object.entries(QUIZ_DATA).forEach(([name, data]) => {
    const btn = document.createElement('button');
    btn.className = 'genre-btn';
    btn.dataset.genre = name;
    btn.innerHTML = `
      <span class="genre-icon">${data.icon}</span>
      ${name}
      <div class="genre-count">${data.questions.length}問収録</div>
    `;
    btn.onclick = () => openModal(name, data.icon, data.questions.length, btn);
    grid.appendChild(btn);
  });
}

function openModal(name, icon, count, btn) {
  // ジャンルカードをハイライト
  document.querySelectorAll('.genre-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  state.genre = name;

  // モーダルの中身を設定
  document.getElementById('modal-icon').textContent = icon;
  document.getElementById('modal-name').textContent = name;
  document.getElementById('modal-count').textContent = `${count}問収録 ／ ランダム10問出題`;

  // 前回の名前を引き継ぎ
  const savedName = document.getElementById('player-name').value;
  // 入力フィールドはモーダル内にあるのでそのまま

  document.getElementById('confirm-modal').classList.add('open');

  // 名前入力にフォーカス（少し遅延）
  setTimeout(() => {
    const input = document.getElementById('player-name');
    if (!input.value) input.focus();
  }, 250);
}

function closeModal() {
  document.getElementById('confirm-modal').classList.remove('open');
}

// モーダル外クリックで閉じる
document.addEventListener('click', e => {
  const overlay = document.getElementById('confirm-modal');
  if (e.target === overlay) closeModal();
});

// =============================================
//  ゲーム開始
// =============================================
function startGame() {
  if (!state.genre) { alert('ジャンルを選択してください！'); return; }
  const name = document.getElementById('player-name').value.trim() || 'ゲスト';
  state.player = name;

  closeModal();

  const pool = [...QUIZ_DATA[state.genre].questions];
  shuffle(pool);
  state.questions = pool.slice(0, 10);
  state.qIndex = 0;
  state.score = 0;
  state.timeLeft = 120;
  state.mistakes = [];
  state.correctCount = 0;
  state.wrongCount = 0;
  state.answered = false;

  showScreen('screen-quiz');
  renderQuestion();
  startTimer();
}

// =============================================
//  問題表示
// =============================================
function renderQuestion() {
  const q = state.questions[state.qIndex];
  document.getElementById('q-num').textContent = state.qIndex + 1;
  document.getElementById('q-score').textContent = state.score;

  const badge = document.getElementById('q-type-badge');
  if (q.type === 'mc') {
    badge.textContent = '4択'; badge.className = 'q-type-badge badge-mc';
  } else {
    badge.textContent = '○×'; badge.className = 'q-type-badge badge-tf';
  }

  document.getElementById('q-text').textContent = q.q;
  document.getElementById('feedback-area').innerHTML = '';
  document.getElementById('next-btn').style.display = 'none';
  state.answered = false;

  const area = document.getElementById('choices-area');
  area.innerHTML = '';

  if (q.type === 'mc') {
    const wrap = document.createElement('div');
    wrap.className = 'choices';
    q.choices.forEach((c, i) => {
      const btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.innerHTML = `<span class="choice-label">${['A','B','C','D'][i]}</span>${c}`;
      btn.onclick = () => answerMC(i, q, wrap);
      wrap.appendChild(btn);
    });
    area.appendChild(wrap);
  } else {
    const wrap = document.createElement('div');
    wrap.className = 'tf-choices';
    ['maru','batsu'].forEach(t => {
      const btn = document.createElement('button');
      btn.className = `tf-btn tf-${t}`;
      btn.innerHTML = t === 'maru'
        ? `<span>⭕</span><span class="tf-label">正しい</span>`
        : `<span>❌</span><span class="tf-label">間違い</span>`;
      btn.onclick = () => answerTF(t === 'maru', q, wrap);
      wrap.appendChild(btn);
    });
    area.appendChild(wrap);
  }
}

function answerMC(idx, q, wrap) {
  if (state.answered) return;
  state.answered = true;
  const btns = wrap.querySelectorAll('.choice-btn');
  btns.forEach(b => b.disabled = true);
  const correct = idx === q.ans;
  btns[idx].classList.add(correct ? 'correct' : 'wrong');
  if (!correct) btns[q.ans].classList.add('correct');
  showFeedback(correct, q.choices[q.ans], q);
}

function answerTF(answer, q, wrap) {
  if (state.answered) return;
  state.answered = true;
  const btns = wrap.querySelectorAll('.tf-btn');
  btns.forEach(b => b.disabled = true);
  const correct = answer === q.ans;
  const idx = answer ? 0 : 1;
  btns[idx].classList.add(correct ? 'correct' : 'wrong');
  if (!correct) btns[answer ? 1 : 0].classList.add('correct');
  const ansLabel = q.ans ? '⭕ 正しい' : '❌ 間違い';
  showFeedback(correct, ansLabel, q);
}

function showFeedback(correct, correctLabel, q) {
  const fb = document.getElementById('feedback-area');
  if (correct) {
    state.score += 10;
    state.timeLeft = Math.min(state.timeLeft + 5, 999);
    state.correctCount++;
    fb.innerHTML = `<div class="feedback correct">✅ 正解！ ＋5秒</div>`;
  } else {
    state.timeLeft = Math.max(state.timeLeft - 5, 0);
    state.wrongCount++;
    state.mistakes.push({ q: q.q, yours: '—', ans: typeof correctLabel === 'string' ? correctLabel : correctLabel });
    fb.innerHTML = `<div class="feedback wrong">❌ 正解は「${correctLabel}」（−5秒）</div>`;
  }
  document.getElementById('q-score').textContent = state.score;
  document.getElementById('next-btn').style.display = 'block';
}

function nextQuestion() {
  state.qIndex++;
  if (state.qIndex >= state.questions.length) {
    endGame();
  } else {
    renderQuestion();
  }
}

// =============================================
//  タイマー
// =============================================
function startTimer() {
  clearInterval(state.timer);
  updateTimerUI();
  state.timer = setInterval(() => {
    state.timeLeft--;
    updateTimerUI();
    if (state.timeLeft <= 0) {
      clearInterval(state.timer);
      endGame();
    }
  }, 1000);
}

function updateTimerUI() {
  const disp = document.getElementById('timer-display');
  const bar = document.getElementById('timer-bar');
  disp.textContent = `${state.timeLeft} 秒`;
  disp.className = 'timer-display' + (state.timeLeft <= 15 ? ' danger' : '');
  const pct = Math.max(0, Math.min(100, (state.timeLeft / 120) * 100));
  bar.style.width = pct + '%';
  if (state.timeLeft <= 15) bar.style.background = 'var(--red)';
  else if (state.timeLeft <= 30) bar.style.background = 'var(--accent)';
  else bar.style.background = 'linear-gradient(90deg, var(--green), var(--accent))';
}

// =============================================
//  ゲーム終了
// =============================================
function endGame() {
  clearInterval(state.timer);
  state.timeBonus = state.timeLeft;
  const total = state.score + state.timeBonus;

  // 結果保存
  saveScore(state.player, state.genre, total, state.correctCount, state.wrongCount, state.timeBonus);

  // 結果画面
  const emoji = total >= 100 ? '🏆' : total >= 60 ? '😊' : '😅';
  document.getElementById('result-emoji').textContent = emoji;
  document.getElementById('result-score').textContent = total;
  document.getElementById('res-correct').textContent = state.correctCount;
  document.getElementById('res-wrong').textContent = state.wrongCount;
  document.getElementById('res-bonus').textContent = '+' + state.timeBonus;

  const mistakesCard = document.getElementById('mistakes-card');
  const mistakesList = document.getElementById('mistakes-list');
  if (state.mistakes.length > 0) {
    mistakesCard.style.display = 'block';
    mistakesList.innerHTML = state.mistakes.map((m, i) =>
      `<div class="mistake-item">
        <div class="mistake-q">❌ Q${i+1}. ${m.q}</div>
        <div class="mistake-ans">✅ 正解：${m.ans}</div>
      </div>`
    ).join('');
  } else {
    mistakesCard.style.display = 'none';
  }

  showScreen('screen-result');
}

function restartGame() {
  showScreen('screen-top');
}

// =============================================
//  スコア保存・ランキング
// =============================================
function saveScore(player, genre, score, correct, wrong, bonus) {
  const key = `vb_rank_${genre}`;
  let ranks = JSON.parse(localStorage.getItem(key) || '[]');
  ranks.push({ player, score, correct, wrong, bonus, date: new Date().toLocaleDateString('ja-JP') });
  ranks.sort((a, b) => b.score - a.score);
  ranks = ranks.slice(0, 10);
  localStorage.setItem(key, JSON.stringify(ranks));
}

function renderRanking() {
  const tabsEl = document.getElementById('ranking-tabs');
  const contentEl = document.getElementById('ranking-content');
  tabsEl.innerHTML = '';
  const genres = Object.keys(QUIZ_DATA);

  function showGenreRank(genre) {
    tabsEl.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.genre === genre));
    const key = `vb_rank_${genre}`;
    const ranks = JSON.parse(localStorage.getItem(key) || '[]');
    if (ranks.length === 0) {
      contentEl.innerHTML = '<div style="color:var(--text-dim);text-align:center;padding:20px">まだ記録がありません</div>';
      return;
    }
    const medals = ['🥇','🥈','🥉'];
    contentEl.innerHTML = `
      <table class="ranking-table">
        <thead><tr><th>#</th><th>名前</th><th>スコア</th><th>正解</th><th>日付</th></tr></thead>
        <tbody>
          ${ranks.map((r, i) => `
            <tr>
              <td><span class="rank-medal">${medals[i] || (i+1)}</span></td>
              <td>${r.player}</td>
              <td><strong>${r.score}</strong></td>
              <td>${r.correct}/10</td>
              <td>${r.date}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    `;
  }

  genres.forEach(g => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn';
    btn.dataset.genre = g;
    btn.textContent = QUIZ_DATA[g].icon + ' ' + g;
    btn.onclick = () => showGenreRank(g);
    tabsEl.appendChild(btn);
  });

  showGenreRank(genres[0]);
}

// =============================================
//  画面管理
// =============================================
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if (id === 'screen-ranking') renderRanking();
  window.scrollTo(0, 0);
}

// =============================================
//  ユーティリティ
// =============================================
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

// 起動
init();
</script>
  <!-- ⭐ スタンプ送信（とみやんのゲームランド） -->
<script>
(function() {
  var GAME_ID = 'volleyball-quiz';
  // プレーヤー名をポータルから自動セット
  if (window.TomyStamp) {
    var saved = TomyStamp.getPlayer();
    if (saved) {
      // input[type=text] の最初の要素にプレーヤー名をセット
      var inputs = document.querySelectorAll('input[type=text], input:not([type])');
      inputs.forEach(function(el) {
        var ph = (el.placeholder || '').toLowerCase();
        if (ph.indexOf('プレーヤー') !== -1 || ph.indexOf('player') !== -1 || ph.indexOf('name') !== -1 || ph.indexOf('名前') !== -1) {
          if (!el.value) el.value = saved;
        }
      });
    }
  }

  // 結果表示関数をラップしてスタンプ送信
  var _origShow = window.showResult || window.showResultScreen || window.displayResult || null;
  
  // MutationObserver で結果画面の表示を監視
  var observer = new MutationObserver(function(mutations) {
    mutations.forEach(function(m) {
      m.addedNodes.forEach(function(node) {
        if (node.nodeType !== 1) return;
        // 結果画面の要素を探す
        var resultEl = node.querySelector ? node.querySelector('[class*="result"],[id*="result"],[class*="Result"],[id*="Result"]') : null;
        if (!resultEl) return;
        sendStampFromDOM(node);
      });
    });
    // 表示切り替えによる結果画面も監視
    mutations.forEach(function(m) {
      if (m.type === 'attributes' && m.attributeName === 'style') {
        var el = m.target;
        var id = (el.id || '').toLowerCase();
        var cls = (el.className || '').toLowerCase();
        if ((id.indexOf('result') !== -1 || cls.indexOf('result') !== -1) && el.style.display !== 'none') {
          sendStampFromDOM(document.body);
        }
      }
    });
  });
  observer.observe(document.body, { childList: true, subtree: true, attributes: true, attributeFilter: ['style'] });

  function sendStampFromDOM(root) {
    if (!window.TomyStamp) return;
    // 正解数を画面から読み取る
    var correctCount = 0;
    var genreName = '';
    
    // 正解数の要素を探す（よくあるパターン）
    var selectors = [
      '[id*="correct"],[class*="correct"]',
      '[id*="seikai"],[class*="seikai"]',
      '[id*="score"],[class*="score"]'
    ];
    for (var i = 0; i < selectors.length; i++) {
      var el = root.querySelector(selectors[i]);
      if (el) {
        var num = parseInt(el.textContent);
        if (!isNaN(num) && num > 0 && num <= 10) {
          correctCount = num;
          break;
        }
      }
    }
    
    // グローバル変数からも取得を試みる
    var globalVars = ['correctCount','correctNum','seikaiCount','correct','seikai'];
    for (var j = 0; j < globalVars.length; j++) {
      if (typeof window[globalVars[j]] === 'number') {
        correctCount = window[globalVars[j]];
        break;
      }
    }
    
    // ジャンル名を取得
    var genreVars = ['currentGenre','selectedGenre','genreName','genre','currentCategory'];
    for (var k = 0; k < genreVars.length; k++) {
      if (typeof window[genreVars[k]] === 'string' && window[genreVars[k]]) {
        genreName = window[genreVars[k]];
        break;
      }
    }
    if (!genreName) genreName = 'default';
    
    // プレーヤー名
    var player = TomyStamp.getPlayer();
    if (!player) {
      // 画面上のinputから取得
      document.querySelectorAll('input[type=text], input:not([type])').forEach(function(el) {
        var ph = (el.placeholder || '').toLowerCase();
        if (ph.indexOf('プレーヤー') !== -1 || ph.indexOf('player') !== -1) {
          if (el.value) player = el.value;
        }
      });
    }
    if (player) TomyStamp.setPlayer(player);
    
    if (correctCount >= 9) {
      TomyStamp.send(GAME_ID, genreName, correctCount)
        .then(function(r) { if(r.ok) console.log('[⭐ stamp] 獲得! game=' + GAME_ID + ' genre=' + genreName + ' correct=' + correctCount); });
    }
  }

  // showResult 系の関数を上書き（確実な送信）
  ['showResult','showResultScreen','displayResult','showResultPage','endGame','finishGame','showFinalResult'].forEach(function(fn) {
    if (typeof window[fn] === 'function') {
      var orig = window[fn];
      window[fn] = function() {
        var ret = orig.apply(this, arguments);
        setTimeout(function() { sendStampFromDOM(document.body); }, 200);
        return ret;
      };
    }
  });
})();
</script>
